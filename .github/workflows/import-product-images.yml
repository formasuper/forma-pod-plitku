name: Import product images

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/import-product-images.yml"
      - "scripts/apply-product-images.py"

permissions:
  contents: write

concurrency:
  group: product-image-import
  cancel-in-progress: true

jobs:
  import-images:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download product images
        run: |
          python -m pip install --upgrade pip
          python -m pip install "gdown==6.1.0"
          rm -rf assets/products
          mkdir -p assets/products
          python - <<'PY'
          from contextlib import contextmanager
          from pathlib import Path
          import signal
          import gdown

          folder_url = "https://drive.google.com/drive/folders/1Ah2AuOUZf4ebgwViswWfopHkvtBlXHle?usp=sharing"
          output_dir = Path("assets/products")
          output_dir.mkdir(parents=True, exist_ok=True)

          @contextmanager
          def time_limit(seconds):
              def handler(signum, frame):
                  raise TimeoutError(f"download took longer than {seconds} seconds")

              previous = signal.signal(signal.SIGALRM, handler)
              signal.alarm(seconds)
              try:
                  yield
              finally:
                  signal.alarm(0)
                  signal.signal(signal.SIGALRM, previous)

          files = gdown.download_folder(
              url=folder_url,
              output=str(output_dir),
              quiet=True,
              use_cookies=False,
              skip_download=True,
          )
          print(f"Found {len(files)} files in Drive folder.")

          downloaded = 0
          skipped = []
          for item in files:
              name = Path(item.path).name
              target = output_dir / name
              try:
                  with time_limit(45):
                      result = gdown.download(id=item.id, output=str(target), quiet=False, use_cookies=False)
                  if result:
                      downloaded += 1
                  else:
                      skipped.append(name)
              except Exception as exc:
                  skipped.append(name)
                  if target.exists():
                      target.unlink()
                  print(f"Skipped {name}: {exc}")

          print(f"Downloaded {downloaded} product images. Skipped {len(skipped)} files.")
          if skipped:
              print("Skipped files:")
              for name in skipped:
                  print("- " + name)
          PY

      - name: Map catalog images
        run: python scripts/apply-product-images.py

      - name: Commit imported images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/products data/catalog.json
          if git diff --cached --quiet; then
            echo "No product image changes to commit."
          else
            git commit -m "Import product images"
            git push
          fi
