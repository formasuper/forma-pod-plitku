name: Import product images

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/import-product-images.yml"
      - "scripts/apply-product-images.py"

permissions:
  contents: write

jobs:
  import-images:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download product images
        run: |
          python -m pip install --upgrade pip
          python -m pip install gdown
          rm -rf assets/products
          mkdir -p assets/products
          python - <<'PY'
          import gdown

          gdown.download_folder(
              url="https://drive.google.com/drive/folders/1Ah2AuOUZf4ebgwViswWfopHkvtBlXHle?usp=sharing",
              output="assets/products",
              quiet=False,
              use_cookies=False,
          )
          PY

      - name: Map catalog images
        run: python scripts/apply-product-images.py

      - name: Commit imported images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/products data/catalog.json
          if git diff --cached --quiet; then
            echo "No product image changes to commit."
          else
            git commit -m "Import product images"
            git push
          fi
